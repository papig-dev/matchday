<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matchday</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1117;font-family:'Segoe UI',sans-serif;color:#e6edf3;display:flex;justify-content:center;padding:20px;}
#app{display:grid;grid-template-columns:250px 1fr;gap:16px;width:1110px;max-width:100%;}
/* sidebar as overlay on mobile */
#sidebar{display:flex;flex-direction:column;gap:12px;transition:transform .25s;}
#backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:49;}
#backdrop.show{display:block;}
#toggle-sidebar{display:none;}
.panel{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden;}
.panel-title{padding:9px 14px;font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #30363d;}
#round-nav{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid #30363d;}
#round-label{font-size:12px;font-weight:600;}
.rnb{background:none;border:1px solid #30363d;color:#8b949e;width:24px;height:24px;border-radius:5px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.rnb:hover{background:#21262d;color:#e6edf3;}.rnb:disabled{opacity:.3;cursor:default;}
.mr{padding:9px 14px;cursor:pointer;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center;transition:background .12s;}
.mr:last-child{border-bottom:none;}.mr:hover{background:#1c2128;}
.mr.live{background:#0d2035;border-left:3px solid #58a6ff;padding-left:11px;}
.mr.done{opacity:.55;}
.mr-t{font-size:12px;display:flex;gap:5px;align-items:center;}
.mr-s{font-size:12px;font-weight:700;min-width:34px;text-align:right;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#58a6ff;animation:blink 1s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tbl-r{display:grid;grid-template-columns:18px 1fr 20px 20px 20px 26px;gap:3px;padding:5px 12px;border-bottom:1px solid #21262d;align-items:center;font-size:11px;}
.tbl-r:last-child{border-bottom:none;}.tbl-r.hdr{color:#8b949e;font-size:10px;font-weight:600;}
.tbl-r:not(.hdr):hover{background:#1c2128;}
.pts{font-weight:700;text-align:right;}.posc{color:#8b949e;}
.dot8{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle;}
#main{display:flex;flex-direction:column;}
#scorebar{background:#161b22;border:1px solid #30363d;border-radius:10px 10px 0 0;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.ti{display:flex;align-items:center;gap:9px;}
.badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.tn{font-size:14px;font-weight:600;}
#score{font-size:30px;font-weight:700;letter-spacing:5px;}
#minb{font-size:11px;color:#58a6ff;background:#1f2937;padding:2px 9px;border-radius:20px;margin-top:3px;display:inline-block;}
#pbar{height:3px;display:flex;}
#ph{background:#1d6fa8;transition:width .8s;width:50%;}
#pa{background:#c0392b;transition:width .8s;width:50%;}
canvas{display:block;border-left:1px solid #30363d;border-right:1px solid #30363d;}
#evbar{background:#161b22;border:1px solid #30363d;border-radius:0 0 10px 10px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;}
#evt{font-size:12px;color:#8b949e;}#evt span{color:#e6edf3;font-weight:500;}
#spds{display:flex;gap:4px;}
.spd{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 9px;border-radius:5px;font-size:11px;cursor:pointer;}
.spd.on{background:#1d6fa8;border-color:#58a6ff;color:#fff;}
#strow{margin-top:10px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.st{text-align:center;}.sl{font-size:10px;color:#8b949e;margin-bottom:3px;}
.sb{height:3px;background:#21262d;border-radius:2px;display:flex;overflow:hidden;}
.sbh,.sba{transition:width .6s;}
.sn{display:flex;justify-content:space-between;font-size:10px;margin-top:2px;color:#8b949e;}
#btn-restart{width:100%;padding:6px;background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;}
#btn-restart:hover{background:#1d6fa8;border-color:#58a6ff;color:#fff;}
#confirm-box{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;}
#confirm-box.show{display:flex;}
#confirm-inner{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;width:320px;text-align:center;}
#confirm-inner h3{font-size:15px;margin-bottom:8px;}
#confirm-inner p{font-size:12px;color:#8b949e;margin-bottom:16px;line-height:1.6;}
.cbtn{padding:7px 20px;border-radius:6px;font-size:12px;cursor:pointer;border:none;}
.cbtn.ok{background:#1d6fa8;color:#fff;margin-right:8px;}
.cbtn.ok:hover{background:#2980b9;}
.cbtn.cancel{background:#21262d;color:#8b949e;border:1px solid #30363d;}
#htov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.78);align-items:center;justify-content:center;flex-direction:column;gap:6px;z-index:9;border-left:1px solid #30363d;border-right:1px solid #30363d;}
#htov.show{display:flex;}
#htov h2{font-size:18px;}#htov p{font-size:12px;color:#8b949e;}
.tact{font-size:10px;color:#8b949e;margin-top:1px;letter-spacing:.3px;}
#strow{transition:all .2s;}
#strow.hidden{display:none;}
#stats-toggle{background:none;border:none;color:#8b949e;font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;}
#stats-toggle:hover{color:#e6edf3;}
canvas{width:100%;height:auto;display:block;}

@media(max-width:860px){
  body{padding:0;}
  #app{grid-template-columns:1fr;gap:0;width:100%;}
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;width:260px;z-index:50;
    background:#0d1117;padding:16px 12px;gap:12px;overflow-y:auto;
    transform:translateX(-110%);
  }
  #sidebar.open{transform:translateX(0);}
  #toggle-sidebar{
    display:flex;align-items:center;justify-content:center;
    background:none;border:1px solid #30363d;color:#8b949e;
    width:30px;height:30px;border-radius:6px;font-size:16px;cursor:pointer;
    flex-shrink:0;
  }
  #toggle-sidebar:hover{background:#21262d;color:#e6edf3;}
  #scorebar{border-radius:0;border-left:none;border-right:none;border-top:none;}
  #evbar{border-radius:0;border-left:none;border-right:none;}
  #strow{border-radius:0;border-left:none;border-right:none;}
}
</style>
</head>

// style: 'possession' | 'counter' | 'highpress'
const TACTICS = {
  MC:  {formation:'4-3-3',   style:'possession'},
  ARS: {formation:'4-3-3',   style:'highpress'},
  LIV: {formation:'4-2-3-1', style:'highpress'},

const STYLE_ICON  = {possession:'',highpress:'',counter:''};

const TK=Object.keys(TEAMS);

// ── SCHEDULE ──────────────────────────────────────────────────────────────────
function genSch(){
  const n=TK.length,t=[...TK],rounds=[];
  for(let r=0;r<n-1;r++){
    const fx=[];
    for(let i=0;i<n/2;i++)fx.push({h:t[i],a:t[n-1-i]});
    rounds.push(fx);t.splice(1,0,t.pop());
  }
  return[...rounds,...rounds.map(r=>r.map(f=>({h:f.a,a:f.h})))];
}
const SCH=genSch();

// ── STATE ────────────────────────────────────────────────────────────────────
function fresh(){
  const tbl={};TK.forEach(k=>tbl[k]={w:0,d:0,l:0,gf:0,ga:0});
  return{tbl,res:SCH.map(r=>r.map(()=>null)),wr:0,wm:0,live:null};
}
function load(){try{const d=JSON.parse(localStorage.getItem('matchday1'));return(d&&d.tbl)?d:fresh();}catch{return fresh();}}
function save(){localStorage.setItem('matchday1',JSON.stringify(ST));}
let ST=load();

// ── AUDIO ────────────────────────────────────────────────────────────────────
let AC=null;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function cheer(big){
  if(!AC)return;
  if(AC.state==='suspended')AC.resume();
  const dur=big?4.5:1.0,sr=AC.sampleRate;
  const buf=AC.createBuffer(2,sr*dur,sr);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<d.length;i++){
      const t=i/sr;
      const e=big?Math.min(1,t*6)*Math.exp(-t*.7):Math.min(1,t*12)*Math.exp(-t*2.2);
      d[i]=(Math.random()*2-1)*e*(ch?.33:.36);
    }
  }
  const s=AC.createBufferSource();s.buffer=buf;
  const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=big?900:600;
  const g=AC.createGain();g.gain.value=big?1.1:.5;
  s.connect(f);f.connect(g);g.connect(AC.destination);s.start();
}

  }

  cx.strokeRect(PX,PY,PW,PH);
  cx.beginPath();cx.moveTo(PX+PW/2,PY);cx.lineTo(PX+PW/2,PY+PH);cx.stroke();
  cx.beginPath();cx.arc(PX+PW/2,PY+PH/2,66,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.arc(PX+PW/2,PY+PH/2,3,0,Math.PI*2);
  cx.fillStyle='rgba(255,255,255,.65)';cx.fill();
  const pw=128,ph=215,py=PY+(PH-ph)/2;
  cx.strokeRect(PX,py,pw,ph);cx.strokeRect(PX+PW-pw,py,pw,ph);
  const bw=48,bh=108,by=PY+(PH-bh)/2;

function lt(hex,a){const n=parseInt(hex.slice(1),16);return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&0xff)+a)},${Math.min(255,(n&0xff)+a)})`;}

// ── FORMATIONS ────────────────────────────────────────────────────────────────
// [rx, ry, role, label, prefRy]  — home-team perspective (attacking right)
const FORMATIONS = {
  '4-3-3': [
    [.04,.50,'GK','GK',.50],
    [.18,.87,'DEF','RB',.87],[.18,.62,'DEF','CB',.62],
    [.18,.38,'DEF','CB',.38],[.18,.13,'DEF','LB',.13],
    [.38,.72,'MID','RM',.72],[.38,.50,'MID','DM',.50],[.38,.28,'MID','LM',.28],
    [.65,.85,'ATT','RW',.88],[.65,.50,'ATT','ST',.50],[.65,.15,'ATT','LW',.12],
  ],
  '4-4-2': [
    [.04,.50,'GK','GK',.50],
    [.18,.87,'DEF','RB',.87],[.18,.62,'DEF','CB',.62],
    [.18,.38,'DEF','CB',.38],[.18,.13,'DEF','LB',.13],
    [.45,.88,'MID','RM',.88],[.38,.60,'MID','CM',.60],
    [.38,.40,'MID','CM',.40],[.45,.12,'MID','LM',.12],
    [.65,.65,'ATT','ST',.65],[.65,.35,'ATT','ST',.35],
  ],
  '4-2-3-1': [
    [.04,.50,'GK','GK',.50],
    [.18,.87,'DEF','RB',.87],[.18,.62,'DEF','CB',.62],
    [.18,.38,'DEF','CB',.38],[.18,.13,'DEF','LB',.13],
    [.35,.65,'MID','DM',.65],[.35,.35,'MID','DM',.35],
    [.56,.82,'MID','RM',.82],[.56,.50,'MID','AM',.50],[.56,.18,'MID','LM',.18],
    [.72,.50,'ATT','ST',.50],
  ],
  '3-5-2': [
    [.04,.50,'GK','GK',.50],
    [.18,.70,'DEF','CB',.70],[.18,.50,'DEF','CB',.50],[.18,.30,'DEF','CB',.30],
    [.48,.92,'MID','RWB',.92],[.38,.68,'MID','CM',.68],
    [.35,.50,'MID','DM',.50],[.38,.32,'MID','CM',.32],[.48,.08,'MID','LWB',.08],
    [.66,.65,'ATT','ST',.65],[.66,.35,'ATT','ST',.35],
  ],
};

class Player{
  constructor(i,isH,teamKey){
    const fmt=FORMATIONS[TACTICS[teamKey].formation];
    const f=fmt[i], pd=TEAMS[teamKey].pl[i];
    this.isH=isH; this.col=TEAMS[teamKey].c;
    this.role=f[2]; this.lbl=pd.n.split(/[\s-]/).pop().slice(0,6).toUpperCase();
    this.pRy=f[4];
    this.hrx=isH?f[0]:1-f[0]; this.hry=isH?f[1]:f[1]; // Y stays same (pitch symmetric)
    this.rx=this.hrx; this.ry=this.hry;
    this.vx=0; this.vy=0;
    this.pace=pd.pa/99; this.shoot=pd.sh/99; this.pass=pd.ps/99;
    this.drib=pd.dr/99; this.defend=pd.de/99;
    this.style=TACTICS[teamKey].style;
  }
  // role: 'carrier'|'support'|'presser'|'shape-att'|'shape'
  // others: array of {rx,ry} of all other players (for separation)
  update(brx,bry,role,others=[]){
    let tx,ty;
    if(this.role==='GK'){
      tx=this.hrx+(brx-this.hrx)*.03;
      ty=.5+(bry-.5)*.22;
    } else if(role==='carrier'){
      const fwd=this.isH?.003:-.003;
      tx=Math.max(.05,Math.min(.95,this.rx+fwd));
      ty=this.ry+(Math.random()-.5)*.002;
    } else if(role==='support'){
      // open passing lane: position diagonally ahead of carrier
      const ahead=this.isH?.14:-.14;
      tx=brx+ahead;
      ty=this.pRy+(bry-this.pRy)*.3;
    } else if(role==='presser'){
      // close down carrier — but not too fast (realistic press)
      tx=this.rx+(brx-this.rx)*.08;
      ty=this.ry+(bry-this.ry)*.08;
    } else if(role==='shape-att'){
      // attacking shape — style affects how far team pushes up
      const push = this.style==='possession'?.10 : this.style==='highpress'?.08 : .05;
      tx=this.hrx+(this.isH?push:-push)+(brx-this.hrx)*.06;
      ty=this.pRy+(bry-this.pRy)*.07;
      if(this.role==='DEF')tx=this.isH?Math.min(tx,.55):Math.max(tx,.45);
      if(this.role==='ATT')tx=this.isH?Math.max(tx,.38):Math.min(tx,.62);
    } else {
      // defending shape — counter sits deep, highpress pushes high
      const basePull = this.style==='counter'?.10 : this.style==='highpress'?.02 : .06;
      const pull = this.isH?-basePull:basePull;
      const ballSide=(bry-.5)*.07;
      tx=this.hrx+pull+(brx-this.hrx)*.08;
      ty=this.pRy+ballSide+(bry-this.pRy)*.06;
      // defensive line depth by style
      const defMax = this.style==='counter'?.44 : this.style==='highpress'?.58 : .50;
      if(this.role==='DEF')tx=this.isH?Math.min(tx,defMax):Math.max(tx,1-defMax);
      if(this.role==='ATT')tx=this.isH?Math.max(tx,.34):Math.min(tx,.66);
    }

    // ── separation: push away from nearby players ──────────────
    const SEP_RADIUS=0.10, SEP_FORCE=0.018;
    others.forEach(o=>{
      const dx=this.rx-o.rx, dy=this.ry-o.ry;
      const d=Math.hypot(dx,dy);
      if(d<SEP_RADIUS&&d>.001){
        const f=(SEP_RADIUS-d)/SEP_RADIUS*SEP_FORCE;
        tx+=dx/d*f;
        ty+=dy/d*f;
      }
    });

    const dx=tx-this.rx, dy=ty-this.ry;
    const weatherMult = weather==='snow'?.78 : weather==='rain'?.90 : 1.0;
    const maxSpd=(.0012+this.pace*.0008)*weatherMult;
    this.vx=this.vx*.88+dx*.018+(Math.random()-.5)*.0003;
    this.vy=this.vy*.88+dy*.018+(Math.random()-.5)*.0003;
    const sp=Math.hypot(this.vx,this.vy);
    if(sp>maxSpd){this.vx*=maxSpd/sp;this.vy*=maxSpd/sp;}
    this.rx=Math.max(.02,Math.min(.98,this.rx+this.vx));
    this.ry=Math.max(.03,Math.min(.97,this.ry+this.vy));
  }
}

// ── BALL CLASS ────────────────────────────────────────────────────────────────
class Ball{
  constructor(){this.rx=.5;this.ry=.5;this.vx=0;this.vy=0;this.trail=[];this.flying=false;this.tx=.5;this.ty=.5;}
  attachTo(p){
    // ball sticks tightly to carrier — offset slightly forward
    const off=p.isH?.018:-.018;
    this.rx=p.rx+off;this.ry=p.ry+.005*(Math.random()-.5);
    this.vx=p.vx;this.vy=p.vy;
    this.trail=[];
  }
  kick(tx,ty,power){
    this.flying=true;this.tx=tx;this.ty=ty;
    const dx=tx-this.rx,dy=ty-this.ry,d=Math.hypot(dx,dy)||.001;
    this.vx=dx/d*power;this.vy=dy/d*power;
  }
  update(targetPlayer){
    this.trail.push({x:this.rx,y:this.ry});
    if(this.trail.length>7)this.trail.shift();
    if(!this.flying){
      // smoothly follow carrier (no snap)
      if(targetPlayer){
        const off=targetPlayer.isH?.016:-.016;
        this.rx+=(targetPlayer.rx+off-this.rx)*.25;
        this.ry+=(targetPlayer.ry-this.ry)*.25;
        this.vx=targetPlayer.vx; this.vy=targetPlayer.vy;
      }
      return;
    }
    this.vx*=.87; this.vy*=.87;
    this.rx=Math.max(0,Math.min(1,this.rx+this.vx));
    this.ry=Math.max(0,Math.min(1,this.ry+this.vy));
    // arrived near target player → hand off possession
    if(targetPlayer && pendingCarIdx>=0){
      const d=Math.hypot(this.rx-targetPlayer.rx, this.ry-targetPlayer.ry);
      if(d<.06){ this.flying=false; carIdx=pendingCarIdx; pendingCarIdx=-1; }
    }
    if(Math.hypot(this.vx,this.vy)<.002){ this.flying=false; }
  }
}

function saveLive(){

function updateScorebar(){
  // left team = whoever is attacking right (isH=true), right team = attacking left
  const homeOnLeft = HP.length===0 || HP[0].isH;

function startMatch(r,m){
  wr=r;wm=m;ST.wr=r;ST.wm=m;

  AP=FORMATIONS[TACTICS[ak].formation].map((_,i)=>new Player(i,false,ak));
  ball=new Ball();
  pendingCarIdx=-1;gFlash=0;frm=0;

  const lv=ST.live;

    sc=[...lv.sc];min=lv.min;phase=lv.phase;
    stats={sh:[...lv.stats.sh],so:[...lv.stats.so]};
    hPoss=lv.hPoss;poss=lv.poss;carIdx=lv.carIdx;
    eventTimer=0;
  } else {
    sc=[0,0];min=1;phase='first';
    poss='home';carIdx=9;eventTimer=0;hPoss=50;stats={sh:[0,0],so:[0,0]};
    ST.live=null;
  }

  ['sh-h','so-h','po-h'].forEach(id=>document.getElementById(id).style.background=TEAMS[hk].c);

// ── TICK ──────────────────────────────────────────────────────────────────────
function tick(){
  if(phase==='halftime'||phase==='ended')return;
  frm+=speed; // clock advances at speed rate, physics always 1x

  // minute
  if(frm%FPM===0){
    min++;
    saveLive(); // persist live state every minute
    if(min===45&&phase==='first'){
      phase='halftime';
      document.getElementById('htsc').textContent=`${TEAMS[hk].name} ${sc[0]} - ${sc[1]} ${TEAMS[ak].name}`;
      document.getElementById('htov').classList.add('show');
      setTimeout(()=>{
        document.getElementById('htov').classList.remove('show');
        min=46;phase='second';ball.rx=.5;ball.ry=.5;ball.vx=0;ball.vy=0;ball.flying=false;poss='away';carIdx=9;
        // swap sides in-place: flip isH and mirror hrx for every player
        [...HP,...AP].forEach(p=>{
          p.isH=!p.isH;
          p.hrx=1-p.hrx;
          p.rx=p.hrx; p.ry=p.hry;
          p.vx=0; p.vy=0;
        });
        updateScorebar();
        setEv('↔',`후반전 시작 — <span>진영 교체</span>`);
        sideFlash=120;
      },Math.max(500,2200/speed));
      return;
    }
    if(min>90&&phase==='second'){
      phase='ended';
      document.getElementById('minb').textContent='FT';
      setEv('■',`경기 종료 — <span>${TEAMS[hk].name} ${sc[0]} - ${sc[1]} ${TEAMS[ak].name}</span>`);
      ST.res[wr][wm]=[...sc];
      ST.live=null; // clear live state for this finished match
      const[h,a]=sc;
      if(h>a){ST.tbl[hk].w++;ST.tbl[ak].l++;}
      else if(h<a){ST.tbl[ak].w++;ST.tbl[hk].l++;}
      else{ST.tbl[hk].d++;ST.tbl[ak].d++;}
      ST.tbl[hk].gf+=h;ST.tbl[hk].ga+=a;ST.tbl[ak].gf+=a;ST.tbl[ak].ga+=h;
      save(); renderSB();
      // auto-advance: next match in this round, or first match of next round
      const delay = Math.max(1500, 3000/speed);
      const nextM = wm+1;
      if(nextM < SCH[wr].length){
        setTimeout(()=>{ startMatch(wr, nextM); renderSB(); }, delay);
      } else {
        const nextR = wr+1;
        if(nextR < SCH.length){
          ST.wr=nextR; vr=nextR;
          save(); renderSB();
          setTimeout(()=>{ startMatch(nextR, 0); renderSB(); }, delay);
        } else {
          setEv('','시즌 종료!');
        }
      }
      return;
    }
  }

  hPoss+=poss==='home'?.035:-.035;hPoss=Math.max(28,Math.min(72,hPoss));

  // ball update — pass target player so it knows when to hand off
  const pTeamNow=poss==='home'?HP:AP;
  const ballTarget=pendingCarIdx>=0 ? pTeamNow[pendingCarIdx] : pTeamNow[carIdx];
  ball.update(ballTarget);

  // event timer counts in game-frames (speed-adjusted)
  eventTimer-=speed;
  const carrier=(poss==='home'?HP:AP)[carIdx];

  if(eventTimer<=0||!ball.flying===false&&Math.hypot(ball.rx-carrier.rx,ball.ry-carrier.ry)>.15){
    // decide next action
    const pTeam=poss==='home'?HP:AP;
    const carStat=pTeam[carIdx];
    const rand=Math.random();
    // attIsH: true = attacking team shoots toward right goal
    const attIsH = (poss==='home'?HP:AP)[0].isH;
    const attackProg = attIsH ? carrier.rx : (1-carrier.rx);

    // tactical style of attacking team
    const attStyle = TACTICS[poss==='home'?hk:ak].style;
    // shot zone: attacking third / penalty area (direction-aware)
    const inThird  = attIsH ? carrier.rx>0.65 : carrier.rx<0.35;
    const inBox    = attIsH ? carrier.rx>0.80 : carrier.rx<0.20;
    const boxMult   = attStyle==='counter'?1.2 : attStyle==='possession'?.85 : 1.0;
    const thirdMult = attStyle==='counter'?1.3 : attStyle==='possession'?.70 : 1.0;
    const shotProb  = inBox ? .55*boxMult : inThird ? .20*thirdMult : 0;

    if(rand < shotProb){
      // SHOT — direction depends on which side attacker faces
      const gy=.5+(Math.random()-.5)*.14;
      const goalX = attIsH ? 1.02 : -0.02;
      ball.kick(goalX, gy, .018+carStat.shoot*.007);
      pendingCarIdx=-1;
      stats.sh[poss==='home'?0:1]++;
      setEv('◎',`<span>${carStat.lbl}</span> — 슛!`);
      eventTimer=FPM*.20;

    } else if(rand < shotProb+.45){
      // PASS — prefer forward/wide teammates (direction-aware)
      const fwd=attIsH?1:-1;
      const candidates=pTeam
        .map((p,i)=>({p,i,score:(p.rx-carrier.rx)*fwd+Math.random()*.12}))
        .filter(x=>x.i!==carIdx&&x.i!==0&&x.i!==pendingCarIdx)
        .sort((a,b)=>b.score-a.score);
      const pick=candidates[Math.floor(Math.random()*Math.min(3,candidates.length))];
      if(pick){
        const weatherPassPenalty = weather==='snow'?.22 : weather==='rain'?.12 : 0;
        const passOK=Math.random()<(.3+carStat.pass*.65-weatherPassPenalty);
        if(passOK){
          // ball flies to receiver's position; carIdx switches only when ball arrives
          ball.kick(pick.p.rx, pick.p.ry, .014+carStat.pass*.008);
          pendingCarIdx=pick.i;
          if(Math.random()<.3){const e=EVS[Math.floor(Math.random()*EVS.length)];setEv(e.i,`<span>${carStat.lbl}→${pick.p.lbl}</span> ${e.t}`);}
        } else {
          // interception → turnover
          pendingCarIdx=-1;
          ball.flying=false;
          poss=poss==='home'?'away':'home';
          carIdx=4+Math.floor(Math.random()*5);
          setEv('✂',`<span>${poss==='home'?TEAMS[hk].name:TEAMS[ak].name}</span> 볼 탈취`);
        }
      }
      eventTimer=FPM*.10+Math.random()*FPM*.13;

    } else {
      // DRIBBLE
      eventTimer=FPM*.06+Math.random()*FPM*.08;
    }

    // random loose ball / tackle
    if(Math.random()<.04){
      pendingCarIdx=-1; ball.flying=false;
      poss=poss==='home'?'away':'home';
      carIdx=4+Math.floor(Math.random()*5);
    }
  }

  // (ball follows carrier smoothly inside ball.update)

  // goal check — direction-aware (HP[0].isH tells which end home attacks)
  const gy1=.5-.065,gy2=.5+.065;
  const homeRight=HP[0].isH; // true=home attacks right goal, false=home attacks left
  function checkGoal(ballAtRight){
    if(!ball.flying)return;
    const atRight = ball.rx>=.985, atLeft = ball.rx<=.015;
    if(!(ballAtRight?atRight:atLeft))return;
    if(!(gy1<=ball.ry&&ball.ry<=gy2))return;
    // who is shooting toward this end?
    const scoringPoss = (ballAtRight===homeRight)?'home':'away';
    const scorer=(poss==='home'?HP:AP)[carIdx];
    if(poss===scoringPoss&&Math.random()<.08+scorer.shoot*.18){
      const isHome=scoringPoss==='home';
      if(isHome){sc[0]++;setEv('⚽',`<span>GOAL! ${TEAMS[hk].name} — ${scorer.lbl}</span>`);}
      else{sc[1]++;setEv('⚽',`<span>GOAL! ${TEAMS[ak].name} — ${scorer.lbl}</span>`);}
      gFlash=110;cheer(true);stats.so[isHome?0:1]++;saveLive();
      // conceding team kicks off
      poss=isHome?'away':'home';
    } else {
      setEv('🧤','GK 선방!');cheer(false);
      poss=poss==='home'?'away':'home'; // turnover after save
    }
    ball.rx=.5;ball.ry=.5;ball.vx=0;ball.vy=0;ball.flying=false;
    pendingCarIdx=-1;carIdx=9;eventTimer=FPM*.25;
  }
  checkGoal(true);checkGoal(false);

  // ── assign roles ──────────────────────────────────────────────
  const attTeam = poss==='home'?HP:AP;
  const defTeam = poss==='home'?AP:HP;
  const carrierP = attTeam[carIdx];

  // 1 support: closest non-carrier, non-GK teammate to ball
  let supportIdx=-1, minDist=99;
  attTeam.forEach((p,i)=>{
    if(i===carIdx||i===0)return;
    const d=Math.hypot(p.rx-carrierP.rx,p.ry-carrierP.ry);
    if(d<minDist){minDist=d;supportIdx=i;}
  });

  // pressers: highpress style gets 2, others get 1
  const defStyle = TACTICS[poss==='home'?ak:hk].style;
  const presserCount = defStyle==='highpress' ? 2 : 1;
  const presserIdxs=[];
  defTeam.forEach((p,i)=>{
    if(i===0)return;
    presserIdxs.push({i,d:Math.hypot(p.rx-carrierP.rx,p.ry-carrierP.ry)});
  });
  presserIdxs.sort((a,b)=>a.d-b.d);
  const presserSet=new Set(presserIdxs.slice(0,presserCount).map(x=>x.i));

  // all player positions for separation
  const allPos=[...HP,...AP].map(p=>({rx:p.rx,ry:p.ry}));

  HP.forEach((p,i)=>{
    const others=allPos.filter((_,j)=>j!==i);
    if(p.role==='GK'){p.update(ball.rx,ball.ry,'shape',others);return;}
    if(poss==='home'){
      const r=i===carIdx?'carrier':i===supportIdx?'support':'shape-att';
      p.update(ball.rx,ball.ry,r,others);
    } else {
      const r=presserSet.has(i)?'presser':'shape';
      p.update(ball.rx,ball.ry,r,others);
    }
  });
  AP.forEach((p,i)=>{
    const j=HP.length+i;
    const others=allPos.filter((_,k)=>k!==j);
    if(p.role==='GK'){p.update(ball.rx,ball.ry,'shape',others);return;}
    if(poss==='away'){
      const r=i===carIdx?'carrier':i===supportIdx?'support':'shape-att';
      p.update(ball.rx,ball.ry,r,others);
    } else {
      const r=presserSet.has(i)?'presser':'shape';
      p.update(ball.rx,ball.ry,r,others);
    }
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  tick(); // always 1 physics tick — players move at constant speed
  cx.clearRect(0,0,CW,CH);
  drawPitch();

  // ball trail
  ball.trail.forEach((t,i)=>{
    const p=rp(t.x,t.y),a=(i/ball.trail.length)*.18;
    cx.beginPath();cx.arc(p.x,p.y,2*(i/ball.trail.length+.2),0,Math.PI*2);
    cx.fillStyle=`rgba(220,220,220,${a})`;cx.fill();
  });

  if(gFlash>0){
    cx.fillStyle=`rgba(255,215,0,${Math.min(.25,gFlash/110*.25)})`;
    cx.fillRect(0,0,CW,CH);gFlash--;
  }

  // ── side-swap flash ──────────────────────────────────────────────
  if(sideFlash>0){
    const a=sideFlash/120;
    cx.fillStyle=`rgba(100,160,255,${a*.18})`;
    cx.fillRect(0,0,CW,CH);
    // show team names on their new sides
    cx.font='bold 15px Segoe UI,sans-serif';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle=`rgba(255,255,255,${a*.9})`;
    // home now attacks left (HP[0].isH===false → GK at right)
    cx.fillText(`← ${TEAMS[hk].name}`, CW*.25, CH*.5);
    cx.fillText(`${TEAMS[ak].name} →`, CW*.75, CH*.5);
    sideFlash--;
  }

  // ── weather overlay ─────────────────────────────────────────────
  if(weather==='snow'){
    // slight white tint on pitch
    cx.fillStyle='rgba(255,255,255,.06)';cx.fillRect(0,0,CW,CH);
    cx.fillStyle='rgba(220,235,255,.85)';
    snowFlakes.forEach(f=>{
      const p=rp(f.x,f.y);
      cx.beginPath();cx.arc(p.x,p.y,f.r,0,Math.PI*2);cx.fill();
      f.phase+=0.018;
      f.y+=f.spd;
      f.x+=f.dx+Math.sin(f.phase)*.0004; // gentle sway
      if(f.y>1.05){f.y=-0.05;f.x=Math.random();}
      if(f.x<0)f.x=1; if(f.x>1)f.x=0;
    });
  } else if(weather==='rain'){
    cx.strokeStyle='rgba(180,210,255,.45)';cx.lineWidth=1;
    rainDrops.forEach(d=>{
      const p1=rp(d.x,d.y), p2=rp(d.x+.008,d.y+.03);
      cx.beginPath();cx.moveTo(p1.x,p1.y);cx.lineTo(p2.x,p2.y);cx.stroke();
      d.y+=d.spd; d.x+=.004;
      if(d.y>1.05){d.y=-0.05;d.x=Math.random();}
    });
  }

  [...AP,...HP].forEach(p=>{
    const pos=rp(p.rx,p.ry);
    const hb=Math.abs(p.rx-ball.rx)<.05&&Math.abs(p.ry-ball.ry)<.05;
    drawPlayer(pos.x,pos.y,p.lbl,p.col,hb,p.role==='GK');
  });
  const bp=rp(ball.rx,ball.ry);
  drawBall(bp.x,bp.y);

  // ── goal-end team labels (small, always visible) ─────────────────
  const homeRight = HP.length>0 && HP[0].isH; // which end home attacks
  cx.font='10px Segoe UI,sans-serif'; cx.textBaseline='top';
  cx.fillStyle='rgba(255,255,255,.45)';
  cx.textAlign='left';  cx.fillText(`← ${homeRight?TEAMS[hk].name:TEAMS[ak].name}`, 6, 6);
  cx.textAlign='right'; cx.fillText(`${homeRight?TEAMS[ak].name:TEAMS[hk].name} →`, CW-6, 6);

  updateScorebar();
  if(phase!=='ended')document.getElementById('minb').textContent=`${min}'`;
  const hp=Math.round(hPoss),ap=100-hp;
  document.getElementById('ph').style.width=hp+'%';document.getElementById('pa').style.width=ap+'%';
  document.getElementById('po-hn').textContent=hp+'%';document.getElementById('po-an').textContent=ap+'%';
  const ts=stats.sh[0]+stats.sh[1]||1,tso=stats.so[0]+stats.so[1]||1;
  document.getElementById('sh-h').style.width=(stats.sh[0]/ts*100)+'%';
  document.getElementById('sh-a').style.width=(stats.sh[1]/ts*100)+'%';
  document.getElementById('sh-hn').textContent=stats.sh[0];document.getElementById('sh-an').textContent=stats.sh[1];
  document.getElementById('so-h').style.width=(stats.so[0]/tso*100)+'%';
  document.getElementById('so-a').style.width=(stats.so[1]/tso*100)+'%';
  document.getElementById('so-hn').textContent=stats.so[0];document.getElementById('so-an').textContent=stats.so[1];

  requestAnimationFrame(render);
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
let vr=ST.wr;
function renderSB(){
  document.getElementById('round-label').textContent=`라운드 ${vr+1}`;
  document.getElementById('rprev').disabled=vr===0;
  document.getElementById('rnext').disabled=vr===SCH.length-1;
  document.getElementById('mlist').innerHTML=SCH[vr].map((f,mi)=>{
    const res=ST.res[vr][mi];
    const live=vr===wr&&mi===wm&&phase!=='ended';
    const done=res!==null;
    const ss=done?`${res[0]}-${res[1]}`:(live?`${sc[0]}-${sc[1]}`:'');
    const sc_cls=done?'done-s':live?'live-s':'';
    return`<div class="mr${live?' live':''}${done?' done':''}" onclick="pick(${vr},${mi})">
      <div class="mr-t">${live?'<div class="live-dot"></div>':''}<span style="color:${TEAMS[f.h].c2}">${f.h}</span><span style="color:#555">vs</span><span style="color:${TEAMS[f.a].c2}">${f.a}</span></div>
      <div class="mr-s ${sc_cls}">${ss||'vs'}</div></div>`;
  }).join('');
  const sorted=[...TK].sort((a,b)=>{
    const pa=ST.tbl[a],pb=ST.tbl[b];
    return(pb.w*3+pb.d)-(pa.w*3+pa.d)||((pb.gf-pb.ga)-(pa.gf-pa.ga));
  });
  document.getElementById('trows').innerHTML=sorted.map((k,i)=>{
    const t=ST.tbl[k];
    return`<div class="tbl-r"><span class="posc">${i+1}</span><span><span class="dot8" style="background:${TEAMS[k].c2}"></span>${k}</span><span>${t.w}</span><span>${t.d}</span><span>${t.l}</span><span class="pts">${t.w*3+t.d}</span></div>`;
  }).join('');
}
// ── INSTANT SIMULATE ─────────────────────────────────────────────────────────
// Simulate a single match result using team strength (no animation)
function poisson(lambda){
  // proper Poisson random variable, capped at 6
  const L=Math.exp(-lambda); let p=1,k=0;
  do{k++;p*=Math.random();}while(p>L);
  return Math.min(k-1,6);
}
function simResult(hKey, aKey){
  const hStr=TEAMS[hKey].pl.reduce((s,p)=>s+p.sh+p.ps+p.dr,0)/TEAMS[hKey].pl.length;
  const aStr=TEAMS[aKey].pl.reduce((s,p)=>s+p.sh+p.ps+p.dr,0)/TEAMS[aKey].pl.length;
  const total=hStr+aStr;
  // PL average: ~1.4 home, ~1.2 away. Strength shifts ±0.6
  const hxG=1.35+(hStr/total-0.5)*1.2;
  const axG=1.15+(aStr/total-0.5)*1.2;
  return[poisson(hxG),poisson(axG)];
}

function applyResult(r, mi, res){
  ST.res[r][mi] = res;
  const f=SCH[r][mi], [h,a]=res;
  if(h>a){ST.tbl[f.h].w++;ST.tbl[f.a].l++;}
  else if(h<a){ST.tbl[f.a].w++;ST.tbl[f.h].l++;}
  else{ST.tbl[f.h].d++;ST.tbl[f.a].d++;}
  ST.tbl[f.h].gf+=h; ST.tbl[f.h].ga+=a;
  ST.tbl[f.a].gf+=a; ST.tbl[f.a].ga+=h;
}

function confirmRestart(){
  const r=vr;
  const msg = r===0
    ? `라운드 1부터 새로 시작합니다.\n(전체 기록이 초기화됩니다)`
    : `라운드 1~${r} 경기를 자동 계산하고\n라운드 ${r+1}부터 직접 관전합니다.`;
  document.getElementById('confirm-title').textContent=`라운드 ${r+1}부터 새로 시작`;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-box').classList.add('show');
}
function closeConfirm(){ document.getElementById('confirm-box').classList.remove('show'); }
function doRestart(){
  closeConfirm();
  initAC();
  // reset state
  ST = fresh();
  // auto-simulate rounds 0 … vr-1
  for(let r=0; r<vr; r++){
    SCH[r].forEach((f,mi)=>{
      applyResult(r, mi, simResult(f.h, f.a));
    });
  }
  save();
  // start watching first match of chosen round
  startMatch(vr, 0);
  renderSB();
}
window.confirmRestart=confirmRestart;
window.closeConfirm=closeConfirm;
window.doRestart=doRestart;

// ── UI TOGGLES ────────────────────────────────────────────────────────────────
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const bd=document.getElementById('backdrop');
  const open=sb.classList.toggle('open');
  bd.classList.toggle('show',open);
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}
let statsVisible=true;
function toggleStats(){
  statsVisible=!statsVisible;
  document.getElementById('strow').classList.toggle('hidden',!statsVisible);
  document.getElementById('stats-toggle').textContent=statsVisible?'통계 ▾':'통계 ▸';
}
window.toggleSidebar=toggleSidebar;
window.closeSidebar=closeSidebar;
window.toggleStats=toggleStats;

document.getElementById('rprev').onclick=()=>{if(vr>0){vr--;renderSB();}};
document.getElementById('rnext').onclick=()=>{if(vr<SCH.length-1){vr++;renderSB();}};
window.pick=(r,m)=>{initAC();startMatch(r,m);vr=r;renderSB();};
document.querySelectorAll('.spd').forEach(b=>{
  b.onclick=()=>{initAC();speed=parseInt(b.dataset.s);document.querySelectorAll('.spd').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
});
startMatch(ST.wr,ST.wm);
render();
</script>
